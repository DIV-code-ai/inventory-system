<!DOCTYPE html>
<html>
<head>
  <title>Inventory System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fa;
    }

    .card {
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <h2 class="text-center mb-4">Inventory System</h2>

  <!-- Add Product -->
  <div class="card p-4">
    <h5 class="text-center mb-3">Add Product</h5>

    <div class="row">
      <div class="col-md-5">
        <label>Product Name</label>
        <input type="text" id="product" class="form-control" placeholder="Enter product name">
      </div>

      <div class="col-md-4">
        <label>Quantity</label>
        <input type="number" id="quantity" class="form-control" placeholder="Enter quantity">
      </div>

      <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="addProduct()">Add</button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card p-4">
    <h5 class="text-center mb-3">Product List</h5>

    <table class="table table-bordered text-center">
      <thead>
        <tr>
          <th>Product</th>
          <th>Quantity</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="tableBody">
      </tbody>
    </table>
  </div>

</div>

<script>

function addProduct() {

  let product = document.getElementById("product").value;
  let quantity = document.getElementById("quantity").value;

  if (product == "" || quantity == "") {
    alert("Fill all fields");
    return;
  }

  let table = document.getElementById("tableBody");

  let newRow = document.createElement("tr");

  newRow.innerHTML =
    "<td>" + product + "</td>" +
    "<td>" + quantity + "</td>" +
    "<td><button class='btn btn-danger btn-sm' onclick='deleteRow(this)'>Delete</button></td>";

  table.appendChild(newRow);

  document.getElementById("product").value = "";
  document.getElementById("quantity").value = "";
}

function deleteRow(btn) {
  btn.parentElement.parentElement.remove();
}

</script>

</body>
</html>
